<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debby Huang｜行銷企劃</title>
  <meta name="description" content="黃鈺雯 Debby｜數位行銷・文案力・品牌策略・AI 應用，9 年實戰資歷。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --olive: #6B7C45;
      --olive-light: #8A9E5A;
      --olive-dark: #4A5830;
      --cream: #F7F5F0;
      --ink: #1E1E1B;
      --muted: #6B6B65;
      --accent: #C8A96E;
      --border: rgba(107,124,69,0.2);
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 3rem; border-bottom: 1px solid var(--border); background: rgba(247,245,240,0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; letter-spacing: 0.05em; color: var(--olive-dark); }
    .nav-logo span { color: var(--accent); font-style: italic; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--olive); }
    .nav-cta { background: var(--olive); color: #fff; padding: 0.5rem 1.2rem; border-radius: 2rem; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none; transition: background 0.2s; text-decoration: none; display: inline-block; }
    .nav-cta:hover { background: var(--olive-dark); }

    /* HERO */
    .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 88vh; }
    .hero-left { padding: 5rem 3rem; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border); }
    .hero-tag { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--olive); background: rgba(107,124,69,0.1); display: inline-block; padding: 0.3rem 0.8rem; border-radius: 1rem; margin-bottom: 1.5rem; }
    .hero-name { font-family: 'Playfair Display', serif; font-size: 4.5rem; line-height: 1.05; color: var(--ink); margin-bottom: 0.5rem; }
    .hero-name em { color: var(--olive); font-style: italic; }
    .hero-title { font-size: 0.95rem; color: var(--muted); font-weight: 300; letter-spacing: 0.04em; margin-bottom: 2rem; }
    .hero-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--olive-dark); border-left: 3px solid var(--accent); padding-left: 1.2rem; line-height: 1.7; margin-bottom: 2.5rem; white-space: pre-line; }
    .hero-btns { display: flex; gap: 1rem; }
    .btn-primary { background: var(--olive); color: #fff; padding: 0.75rem 1.8rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 0.04em; text-decoration: none; display: inline-block; }
    .btn-primary:hover { background: var(--olive-dark); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--olive); padding: 0.75rem 1.8rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--olive); transition: all 0.2s; letter-spacing: 0.04em; text-decoration: none; display: inline-block; }
    .btn-secondary:hover { background: rgba(107,124,69,0.08); }

    .hero-right { position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 3rem; overflow: hidden; }
    .hero-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; z-index: 0; }
    .hero-photo-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(74,88,48,0.15) 0%, rgba(74,88,48,0.55) 50%, rgba(30,30,27,0.92) 100%); z-index: 1; }
    .hero-bg-text { font-family: 'Playfair Display', serif; font-size: 12rem; font-weight: 700; color: rgba(255,255,255,0.06); position: absolute; top: -1rem; right: -2rem; line-height: 1; pointer-events: none; z-index: 2; }
    .hero-right > *:not(.hero-photo):not(.hero-photo-overlay):not(.hero-bg-text) { position: relative; z-index: 3; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden; backdrop-filter: blur(12px); }
    .stat-cell { background: rgba(255,255,255,0.08); padding: 1.5rem; transition: background 0.2s; backdrop-filter: blur(4px); }
    .stat-cell:hover { background: rgba(255,255,255,0.15); }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--accent); font-weight: 700; line-height: 1; margin-bottom: 0.3rem; white-space: pre-line; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.7); font-weight: 300; letter-spacing: 0.06em; line-height: 1.5; white-space: pre-line; }
    .hero-scroll { color: rgba(255,255,255,0.5); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2rem; display: flex; align-items: center; gap: 0.6rem; }
    .scroll-line { width: 30px; height: 1px; background: rgba(255,255,255,0.35); }

    /* SKILLS */
    .section { padding: 5rem 3rem; }
    .section-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); margin-bottom: 0.5rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--ink); margin-bottom: 0.5rem; }
    .section-sub { font-size: 0.9rem; color: var(--muted); font-weight: 300; margin-bottom: 3rem; }
    .skills-bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .skill-tile { background: var(--cream); padding: 2rem 1.8rem; transition: background 0.2s; }
    .skill-tile:hover { background: #fff; }
    .skill-tile.featured { background: var(--olive-dark); color: #fff; }
    .skill-tile.featured:hover { background: var(--olive); }
    .skill-icon { font-size: 1.6rem; margin-bottom: 1rem; }
    .skill-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .skill-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
    .skill-tile.featured .skill-name { color: #fff; }
    .skill-tile.featured .skill-desc { color: rgba(255,255,255,0.65); }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .tag { font-size: 0.68rem; letter-spacing: 0.06em; padding: 0.2rem 0.6rem; border-radius: 1rem; background: rgba(107,124,69,0.12); color: var(--olive-dark); font-weight: 500; }
    .skill-tile.featured .tag { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }

    /* TIMELINE */
    .timeline-section { background: #fff; padding: 5rem 3rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .timeline { margin-top: 2rem; position: relative; padding-left: 2rem; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px; background: var(--border); }
    .timeline-item { position: relative; margin-bottom: 3rem; padding-left: 2rem; }
    .timeline-dot { position: absolute; left: -2rem; top: 0.3rem; width: 10px; height: 10px; border-radius: 50%; background: var(--olive); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--olive); transform: translateX(-4.5px); }
    .timeline-period { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
    .timeline-role { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.2rem; }
    .timeline-company { font-size: 0.85rem; color: var(--olive); font-weight: 500; margin-bottom: 0.8rem; }
    .timeline-highlights { list-style: none; }
    .timeline-highlights li { font-size: 0.82rem; color: var(--muted); line-height: 1.8; padding-left: 1rem; position: relative; }
    .timeline-highlights li::before { content: '—'; position: absolute; left: 0; color: var(--accent); }

    /* PROJECTS */
    .projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-top: 2rem; }
    .project-card { border: 1px solid var(--border); border-radius: 16px; background: #fff; transition: all 0.35s ease; cursor: pointer; position: relative; overflow: hidden; }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(107,124,69,0.12); border-color: var(--olive-light); }
    .project-card-img { position: relative; width: 100%; height: 200px; overflow: hidden; }
    .project-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .project-card:hover .project-card-img img { transform: scale(1.06); }
    .project-card-img::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, rgba(255,255,255,0.6)); pointer-events: none; }
    .project-card-body { padding: 1.5rem 1.8rem 1.8rem; }
    .project-badge { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 1rem; background: rgba(107,124,69,0.12); color: var(--olive-dark); font-weight: 500; display: inline-block; margin-bottom: 0.8rem; transition: all 0.3s; }
    .project-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 0.5rem; transition: color 0.3s; }
    .project-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.2rem; transition: color 0.3s; }
    .project-result { font-size: 0.78rem; font-weight: 500; color: var(--olive); display: flex; align-items: center; gap: 0.4rem; transition: color 0.3s; background: rgba(107,124,69,0.06); padding: 0.5rem 0.8rem; border-radius: 8px; }

    /* CONTACT */
    .contact-section { background: var(--olive-dark); padding: 5rem 3rem; text-align: center; }
    .contact-section .section-label { color: var(--accent); }
    .contact-section .section-title { color: #fff; font-family: 'Playfair Display', serif; }
    .contact-section .section-sub { color: rgba(255,255,255,0.55); }
    .contact-grid { display: flex; justify-content: center; gap: 2rem; margin-top: 3rem; flex-wrap: wrap; }
    .contact-item { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 1.2rem 2rem; color: #fff; text-align: left; min-width: 180px; }
    .contact-item-label { font-size: 0.72rem; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
    .contact-item-value { font-size: 0.9rem; font-weight: 500; }

    /* FOOTER */
    .footer { padding: 1.5rem 3rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .footer-copy { font-size: 0.75rem; color: var(--muted); }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--olive-dark); }
    .footer-logo span { color: var(--accent); font-style: italic; }

    /* Loading state */
    #loading { position: fixed; inset: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
    #loading.hide { opacity: 0; pointer-events: none; }
    .loading-logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--olive-dark); }
    .loading-logo span { color: var(--accent); font-style: italic; }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; }
      .hero-right { min-height: 50vh; }
      .hero-name { font-size: 3rem; }
      .nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .section, .timeline-section, .contact-section { padding: 3rem 1.5rem; }
      .skills-bento { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      .project-card-img { height: 180px; }
      .footer { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">Debby<span> Huang</span></div>
</div>

<nav class="nav">
  <div class="nav-logo">Debby<span> Huang</span></div>
  <div class="nav-links">
    <a href="#skills">技能</a>
    <a href="#experience">工作經歷</a>
    <a href="#projects">代表專案</a>
    <a href="#contact">聯絡</a>
  </div>
  <a id="nav-resume" href="#" class="nav-cta" style="display:none;">下載履歷</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <span class="hero-tag" id="hero-tag"></span>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-title" id="hero-subtitle"></p>
    <blockquote class="hero-quote" id="hero-quote"></blockquote>
    <div class="hero-btns">
      <a href="#projects" class="btn-primary">查看作品集</a>
      <a href="#contact" class="btn-secondary">與我聯絡</a>
    </div>
  </div>
  <div class="hero-right">
    <img class="hero-photo" id="hero-photo" src="" alt="Debby Huang" />
    <div class="hero-photo-overlay"></div>
    <div class="hero-bg-text">D</div>
    <div style="margin-bottom: 2rem;">
      <p style="font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 1rem;">核心成就數字</p>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="hero-scroll">
      <span class="scroll-line"></span>
      Scroll to explore
    </div>
  </div>
</section>

<!-- SKILLS -->
<section class="section" id="skills">
  <p class="section-label">Core Skills</p>
  <h2 class="section-title">核心能力</h2>
  <p class="section-sub" id="skills-sub"></p>
  <div class="skills-bento" id="skills-bento"></div>
</section>

<!-- EXPERIENCE -->
<div class="timeline-section" id="experience">
  <p class="section-label">Experience</p>
  <h2 class="section-title">工作經歷</h2>
  <p class="section-sub" id="exp-sub"></p>
  <div class="timeline" id="timeline"></div>
</div>

<!-- PROJECTS -->
<section class="section" id="projects">
  <p class="section-label">Projects</p>
  <h2 class="section-title">代表專案</h2>
  <p class="section-sub" id="projects-sub"></p>
  <div class="projects-grid" id="projects-grid"></div>
</section>

<!-- CONTACT -->
<div class="contact-section" id="contact">
  <p class="section-label">Get in Touch</p>
  <h2 class="section-title" id="contact-title"></h2>
  <p class="section-sub" id="contact-sub"></p>
  <div class="contact-grid" id="contact-grid"></div>
</div>

<footer class="footer">
  <span class="footer-copy" id="footer-copy"></span>
  <span class="footer-logo">Debby<span> Huang</span></span>
</footer>

<script>
async function loadJSON(path) {
  const r = await fetch(path + '?v=' + Date.now());
  return r.json();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init() {
  try {
    const [hero, skills, exp, projects, contact] = await Promise.all([
      loadJSON('content/hero.json'),
      loadJSON('content/skills.json'),
      loadJSON('content/experience.json'),
      loadJSON('content/projects.json'),
      loadJSON('content/contact.json'),
    ]);

    // HERO
    document.getElementById('hero-tag').textContent = hero.tag;
    const nameParts = hero.name_zh.split('');
    document.getElementById('hero-name').innerHTML =
      `${esc(nameParts[0])}<em>${esc(nameParts.slice(1).join(''))}</em><br>${esc(hero.name_en)}`;
    document.getElementById('hero-subtitle').textContent = hero.subtitle;
    document.getElementById('hero-quote').textContent = hero.quote;
    if (hero.photo) {
      document.getElementById('hero-photo').src = hero.photo;
    }

    document.getElementById('stats-grid').innerHTML = hero.stats.map(s => `
      <div class="stat-cell">
        <div class="stat-num">${esc(s.num)}</div>
        <div class="stat-label">${esc(s.label)}</div>
      </div>`).join('');

    // Resume link
    if (contact.resume_url) {
      const a = document.getElementById('nav-resume');
      a.href = contact.resume_url;
      a.style.display = 'inline-block';
      a.target = '_blank';
    }

    // SKILLS
    document.getElementById('skills-sub').textContent = skills.sub;
    document.getElementById('skills-bento').innerHTML = skills.items.map(s => `
      <div class="skill-tile ${s.featured ? 'featured' : ''}">
        <div class="skill-icon">${esc(s.icon)}</div>
        <div class="skill-name">${esc(s.name)}</div>
        <div class="skill-desc">${esc(s.desc)}</div>
        <div class="skill-tags">${s.tags.split(',').map(t => `<span class="tag">${esc(t.trim())}</span>`).join('')}</div>
      </div>`).join('');

    // EXPERIENCE
    document.getElementById('exp-sub').textContent = exp.sub;
    document.getElementById('timeline').innerHTML = exp.items.map(e => `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <p class="timeline-period">${esc(e.period)}</p>
        <h3 class="timeline-role">${esc(e.role)}</h3>
        <p class="timeline-company">${esc(e.company)}</p>
        <ul class="timeline-highlights">
          ${e.highlights.map(h => `<li>${esc(h)}</li>`).join('')}
        </ul>
      </div>`).join('');

    // PROJECTS
    document.getElementById('projects-sub').textContent = projects.sub;
    document.getElementById('projects-grid').innerHTML = projects.items.map(p => `
      <div class="project-card">
        ${p.image ? `<div class="project-card-img"><img src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy" /></div>` : ''}
        <div class="project-card-body">
          <span class="project-badge">${esc(p.badge)}</span>
          <h3 class="project-title">${esc(p.title)}</h3>
          <p class="project-desc">${esc(p.desc)}</p>
          <div class="project-result">${esc(p.result)}</div>
        </div>
      </div>`).join('');

    // CONTACT
    document.getElementById('contact-title').textContent = contact.title;
    document.getElementById('contact-sub').textContent = contact.sub;
    document.getElementById('contact-grid').innerHTML = `
      <div class="contact-item"><div class="contact-item-label">手機</div><div class="contact-item-value">${esc(contact.phone)}</div></div>
      <div class="contact-item"><div class="contact-item-label">Email</div><div class="contact-item-value">${esc(contact.email)}</div></div>
      <div class="contact-item"><div class="contact-item-label">地點</div><div class="contact-item-value">${esc(contact.location)}</div></div>
      <div class="contact-item"><div class="contact-item-label">可上班日</div><div class="contact-item-value">${esc(contact.available)}</div></div>`;

    document.getElementById('footer-copy').textContent = `© ${new Date().getFullYear()} ${hero.name_zh} ${hero.name_en} · 保留所有權利`;

  } catch(e) {
    console.error('載入內容失敗：', e);
  }

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading').classList.add('hide');
  }, 300);
}

init();
</script>
</body>
</html>
